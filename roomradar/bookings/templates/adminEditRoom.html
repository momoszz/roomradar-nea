{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Edit Room - RoomRadar</title>
    <link rel='stylesheet' href='{% static "bookings/css/adminEditRoom.css" %}'>
</head>
<body>
    <div class='form-container'>
        <h1>Edit Room</h1>

        {% if messages %}
            {% for message in messages %}
                <div class='error'>{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method='POST'>
            {% csrf_token %}
            <div class='form-group'>
                <label for='roomName'>Room Name</label>
                <input type='text' id='roomName' name='roomName' value='{{ room.roomName }}' required>
            </div>

            <div class='form-group'>
                <label for='capacity'>Capacity</label>
                <input type='number' id='capacity' name='capacity' value='{{ room.capacity }}' required min='1'>
            </div>

            <div class='form-group'>
                <label for='blockLocation'>Block Location</label>
                <input type='text' id='blockLocation' name='blockLocation' value='{{ room.blockLocation }}' required>
            </div>

            <div class='form-group checkbox-group'>
                <input type='checkbox' id='hasProjector' name='hasProjector' {% if room.hasProjector %}checked{% endif %}>
                <label for='hasProjector'>Has Projector</label>
            </div>

            <div class='form-group checkbox-group'>
                <input type='checkbox' id='hasComputers' name='hasComputers' {% if room.hasComputers %}checked{% endif %}>
                <label for='hasComputers'>Has Computers</label>
            </div>

            <button type='submit' name='action' value='update' class='update-btn'>Update Room</button>
            <button type='submit' name='action' value='delete' class='delete-btn' onclick='return confirm("Are you sure you want to delete this room? All bookings for this room will also be deleted.");'>Delete Room</button>
        </form>

        <a href='{% url "manageRooms" %}' class='back-link'>Cancel</a>
    </div>
</body>
</html>
